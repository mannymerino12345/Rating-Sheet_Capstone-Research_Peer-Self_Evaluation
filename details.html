<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluation Details</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: "Times New Roman", Times, serif;
      background: #eef2f7;
      color: #111;
    }

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .back-btn,
    .print-btn {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: bold;
      font-family: Arial, sans-serif;
    }

    .back-btn {
      background: #1a73e8;
      color: #fff;
    }

    .back-btn:hover {
      background: #155ec0;
    }

    .print-btn {
      background: #188038;
      color: #fff;
    }

    .print-btn:hover {
      background: #146c2e;
    }

    .status-text {
      font-family: Arial, sans-serif;
      font-size: 14px;
      color: #444;
    }

    .document {
      background: #fff;
      border: 1px solid #cfcfcf;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 28px 34px 34px;
    }

    .header-image{
      width: 100%;
      text-align: center;
    }
    .footer-image {
      width: 25%;
      text-align: right;
    }

    .header-image img,
    .footer-image img {
      width: 100%;
      max-width: 100%;
      display: block;
      object-fit: contain;
    }

    .header-image {
      margin-bottom: 10px;
    }

    .footer-image {
      margin-top: 24px;
    }

    .doc-title {
      text-align: center;
      font-weight: bold;
      font-size: 26px;
      margin: 18px 0 14px;
      letter-spacing: 0.2px;
    }

    .description {
      font-size: 16px;
      line-height: 1.5;
      text-align: justify;
      margin-bottom: 14px;
    }

    .info-line {
      font-size: 16px;
      margin: 12px 0 14px;
      line-height: 1.8;
    }

    .inline-field {
      display: inline-block;
      min-width: 180px;
      border-bottom: 1px solid #000;
      padding: 0 4px 2px;
      vertical-align: baseline;
      font-weight: normal;
    }

    .inline-field.short {
      min-width: 100px;
    }

    .inline-field.medium {
      min-width: 140px;
    }

    .inline-field.long {
      min-width: 420px;
    }

    .section-label {
      font-size: 16px;
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    .rating-scale {
      font-size: 16px;
      line-height: 1.55;
      margin-bottom: 12px;
    }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
      margin-top: 10px;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border: 1px solid #000;
      padding: 8px 6px;
      text-align: center;
      vertical-align: middle;
      font-size: 15px;
      word-wrap: break-word;
    }

    th.criteria-col,
    td.criteria-col {
      text-align: left;
      width: 34%;
      font-weight: bold;
    }

    thead th {
      font-weight: bold;
      background: #fff;
    }

    .member-head {
      font-size: 14px;
      font-weight: bold;
    }

    .stars-text {
      font-size: 18px;
      letter-spacing: 1px;
      color: #c69200;
      display: inline-block;
      margin-bottom: 2px;
    }

    .score-text {
      font-size: 14px;
      color: #222;
    }

    .zero {
      font-size: 14px;
      color: #666;
    }

    .note-line,
    .comment-line {
      font-size: 16px;
      margin-top: 14px;
      line-height: 1.5;
    }

    .comment-box {
      margin-top: 8px;
      min-height: 70px;
      border: 1px solid #000;
      padding: 10px 12px;
      font-size: 15px;
      white-space: pre-wrap;
    }

    .message-box {
      background: #eef4ff;
      border: 1px solid #cfd6dd;
      border-radius: 8px;
      padding: 16px;
      font-family: Arial, sans-serif;
    }

    @media (max-width: 900px) {
      body {
        padding: 12px;
      }

      .document {
        padding: 16px;
      }

      .doc-title {
        font-size: 22px;
      }

      .description,
      .info-line,
      .section-label,
      .rating-scale,
      .note-line,
      .comment-line {
        font-size: 14px;
      }

      th,
      td {
        font-size: 13px;
      }
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .top-actions {
        display: none;
      }

      .page-wrap {
        max-width: 100%;
        margin: 0;
      }

      .document {
        box-shadow: none;
        border: none;
        padding: 0;
      }

      @page {
        size: A4 portrait;
        margin: 12mm;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="top-actions">
      <button class="back-btn" onclick="window.location.href='viewer.html'">Back to Viewer</button>
      <div class="status-text" id="statusText"></div>
      <button class="print-btn" onclick="window.print()">Print</button>
    </div>

    <div id="detailsOutput" class="message-box">Loading details...</div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbDDQVoaIErsuddgyiNaR4UvcNgCIh7dnDcNLZbl9Qfg4DMmIVl-ihX_dQHlyVpR-1Hg/exec";

    const criteria = [
      "Participated actively in the development of the project plan",
      "Assumed responsibility for planning tasks and met the agreed-upon deadlines for completing each task",
      "Attended group meetings and/or participated actively in group email communication",
      "Contributed an equal share of the work to the final project",
      "Contributed quality written work or critical data to the project",
      "Addressed challenges to the group project as they arose",
      "Teamwork & Collaboration",
      "Resourcefulness & Initiative",
      "Communication",
      "Time management"
    ];

    async function loadDetails() {
      const output = document.getElementById("detailsOutput");
      const statusText = document.getElementById("statusText");
      const params = new URLSearchParams(window.location.search);
      const indexParam = params.get("index");

      if (indexParam === null) {
        output.innerHTML = "No selected record.";
        return;
      }

      const index = parseInt(indexParam, 10);

      if (!Number.isFinite(index) || index < 0) {
        output.innerHTML = "Invalid selected record.";
        return;
      }

      statusText.textContent = "Loading record " + (index + 1) + "...";

      try {
        const response = await fetch(WEB_APP_URL + "?action=list&_=" + Date.now());
        const result = await response.json();

        if (result.status !== "success") {
          output.innerHTML = "Failed to load details.";
          statusText.textContent = "";
          return;
        }

        const submissions = Array.isArray(result.data) ? result.data : [];
        const entry = submissions[index];

        if (!entry) {
          output.innerHTML = "No details found for this record.";
          statusText.textContent = "";
          return;
        }

        output.innerHTML = renderDocument(entry);
        statusText.textContent = "Loaded record " + (index + 1);
      } catch (error) {
        output.innerHTML = "Error loading details.";
        statusText.textContent = "";
        console.error(error);
      }
    }

    function renderDocument(entry) {
      const ratingsMembers = entry.ratingsData && entry.ratingsData.members
        ? entry.ratingsData.members
        : [];

      const members = ratingsMembers.length ? ratingsMembers : [];

      const memberHeaders = members.map(member => {
        return `<th class="member-head">${escapeHtml(member.name)}</th>`;
      }).join("");

      const bodyRows = criteria.map((criterion) => {
        const ratingCells = members.map(member => {
          const score = member.ratings && member.ratings[criterion]
            ? member.ratings[criterion]
            : 0;

          return `<td>${renderStars(score)}</td>`;
        }).join("");

        return `
          <tr>
            <td class="criteria-col">${escapeHtml(criterion)}</td>
            ${ratingCells}
          </tr>
        `;
      }).join("");

      const totalRow = members.map(member => {
        return `<td><strong>${escapeHtml(member.total)}</strong></td>`;
      }).join("");

      return `
        <div class="document">
          <div class="header-image">
            <img src="header.png" alt="Document Header">
          </div>

          <div class="doc-title">RESEARCH/CAPSTONE PROJECT PEER &amp; SELF EVALUATION FORM</div>

          <div class="description">
            The purpose of this form is to rate the overall quality of your work and participation of your fellow
            Research/Capstone Project members’ work and participation. Your instructor will use it to evaluate and
            document your progress quarterly. List all group members’ names, including your own, in the designated
            sections below. Please note that this form is confidential and will not be shared with your group members.
          </div>

          <div class="info-line">
            <strong>Student Reviewer:</strong>
            <span class="inline-field medium">${escapeHtml(entry.reviewer || "")}</span>

            <strong>Time:</strong>
            <span class="inline-field short">${escapeHtml(entry.time || "")}</span>

            <strong>Date:</strong>
            <span class="inline-field medium">${formatDate(entry.date)}</span>

            <strong>Signature:</strong>
            <span class="inline-field medium">${escapeHtml(entry.signature || "")}</span>
          </div>

          <div class="info-line">
            <strong>Research/Capstone Project Title:</strong>
            <span class="inline-field long">${escapeHtml(entry.title || "")}</span>
          </div>

          <div class="section-label">Rating Scale:</div>
          <div class="rating-scale">
            1 = poor, little or no effort was made to meet this requirement<br>
            2 = average, did the work successfully but put forth no special effort<br>
            3 = outstanding and extra effort in this area
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="criteria-col">Group Members' name including your own</th>
                  ${memberHeaders}
                </tr>
              </thead>
              <tbody>
                ${bodyRows}
              </tbody>
              <tfoot>
                <tr>
                  <td class="criteria-col">Overall contribution (30 points Maximum)</td>
                  ${totalRow}
                </tr>
              </tfoot>
            </table>
          </div>

          <div class="note-line">
            “Please add more columns for more additional members.”
          </div>

          <div class="comment-line">
            Please feel free to share additional comments on the back of the page to explain any of your ratings.
          </div>

          <div class="comment-box">${escapeHtml(entry.comments || "")}</div>

          <div class="footer-image">
            <img src="footer.png" alt="Document Footer">
          </div>
        </div>
      `;
    }

    function renderStars(score) {
      const n = Number(score) || 0;
      if (n <= 0) {
        return `<span class="zero">0</span>`;
      }
      return `
        <div class="stars-text">${"★".repeat(n)}</div>
        <div class="score-text">${n}</div>
      `;
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) {
        return escapeHtml(String(value));
      }
      return d.toLocaleDateString();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadDetails();
  </script>
</body>
</html>
