<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Ratings Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 12px;
      color: #222;
    }

    .container {
      max-width: 1900px;
      margin: auto;
      background: #fff;
      padding: 12px;
      border-radius: 14px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .live-info {
      text-align: right;
      font-size: 14px;
      color: #444;
    }

    .badge {
      display: inline-block;
      background: #eaf7ee;
      color: #188038;
      font-weight: bold;
      padding: 6px 12px;
      border-radius: 999px;
      margin-bottom: 6px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 1850px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #c9d1d9;
      padding: 12px 14px;
      text-align: center;
      vertical-align: middle;
      font-size: 15px;
    }

    th {
      background: #2874dc;
      color: white;
      font-size: 16px;
      font-weight: bold;
    }

    td:first-child,
    td:nth-child(2),
    td:nth-child(3) {
      text-align: left;
    }

    tbody tr:nth-child(even) {
      background: #f9fbff;
    }

    tbody tr:hover {
      background: #eef4ff;
    }

    .reviewer-name {
      font-weight: bold;
    }

    .action-btn {
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: bold;
    }

    .action-btn:hover {
      background: #155ec0;
    }

    .empty,
    .loading,
    .error {
      padding: 20px;
      font-size: 16px;
    }

    .error {
      color: #d93025;
    }

    .loading {
      color: #444;
    }

    /* Passcode overlay */
    .auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 16px;
    }

    .auth-box {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      text-align: center;
    }

    .auth-box h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .auth-box p {
      margin-bottom: 16px;
      color: #555;
    }

    .auth-box input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #c9d1d9;
      border-radius: 10px;
      margin-bottom: 12px;
      text-align: center;
    }

    .auth-box button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      background: #2874dc;
      color: white;
      cursor: pointer;
    }

    .auth-box button:hover {
      background: #155ec0;
    }

    .auth-error {
      margin-top: 10px;
      color: #d93025;
      font-size: 14px;
      min-height: 20px;
    }

    .hidden {
      display: none !important;
    }

    #appContent {
      display: none;
    }
  </style>
</head>
<body>
  <!-- Passcode Screen -->
  <div id="authOverlay" class="auth-overlay">
    <div class="auth-box">
      <h2>Enter Verification Code</h2>
      <p>Please enter the code to open the viewer.</p>
      <input
        type="password"
        id="passcodeInput"
        placeholder="Enter code"
        maxlength="5"
      />
      <button onclick="checkPasscode()">Open Viewer</button>
      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <!-- Main App -->
  <div id="appContent">
    <div class="container">
      <div class="top-bar">
        <h1>Ratings Viewer</h1>
        <div class="live-info">
          <div id="lastUpdated">Loading...</div>
        </div>
      </div>

      <div class="table-wrap">
        <div id="output" class="loading">Loading data...</div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwbDDQVoaIErsuddgyiNaR4UvcNgCIh7dnDcNLZbl9Qfg4DMmIVl-ihX_dQHlyVpR-1Hg/exec";
    const STATIC_CODE = "00000";

    let ratingsInterval = null;

    function checkPasscode() {
      const input = document.getElementById("passcodeInput").value;
      const errorBox = document.getElementById("authError");

      if (input === STATIC_CODE) {
        document.getElementById("authOverlay").classList.add("hidden");
        document.getElementById("appContent").style.display = "block";

        loadRatings();

        if (!ratingsInterval) {
          ratingsInterval = setInterval(loadRatings, 5000);
        }
      } else {
        errorBox.textContent = "Incorrect code. Please try again.";
      }
    }

    document.getElementById("passcodeInput").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        checkPasscode();
      }
    });

    async function loadRatings() {
      const output = document.getElementById("output");

      try {
        const response = await fetch(WEB_APP_URL + "?action=list&_=" + Date.now());
        const result = await response.json();

        if (result.status !== "success") {
          output.innerHTML = `<div class="error">Failed to load data.</div>`;
          updateTime();
          return;
        }

        const submissions = Array.isArray(result.data) ? result.data : [];

        if (!submissions.length) {
          output.innerHTML = `<div class="empty">No saved evaluations found.</div>`;
          updateTime();
          return;
        }

        const tableHtml = `
          <table>
            <thead>
              <tr>
                <th>Reviewer</th>
                <th>Project Title</th>
                <th>Date</th>
                <th>Cristian Keneth Costorio</th>
                <th>Manny Merino</th>
                <th>Adrian Bernales</th>
                <th>Ronalyn Pitogo</th>
                <th>Josephine Bedon</th>
                <th>Sherie Pearl De Paz</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              ${submissions.map((entry, index) => {
                const members = entry.ratingsData && entry.ratingsData.members
                  ? entry.ratingsData.members
                  : [];

                const totalMap = {};
                members.forEach(member => {
                  totalMap[member.name] = member.total ?? 0;
                });

                return `
                  <tr>
                    <td class="reviewer-name">${escapeHtml(entry.reviewer || "")}</td>
                    <td>${escapeHtml(entry.title || "")}</td>
                    <td>${formatDate(entry.date)}</td>
                    <td>${escapeHtml(String(totalMap["Cristian Keneth Costorio"] ?? 0))}</td>
                    <td>${escapeHtml(String(totalMap["Manny Merino"] ?? 0))}</td>
                    <td>${escapeHtml(String(totalMap["Adrian Bernales"] ?? 0))}</td>
                    <td>${escapeHtml(String(totalMap["Ronalyn Pitogo"] ?? 0))}</td>
                    <td>${escapeHtml(String(totalMap["Josephine Bedon"] ?? 0))}</td>
                    <td>${escapeHtml(String(totalMap["Sherie Pearl De Paz"] ?? 0))}</td>
                    <td>
                      <button class="action-btn" onclick="goToDetails(${index})">
                        View Details
                      </button>
                    </td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        `;

        output.innerHTML = tableHtml;
        updateTime();
      } catch (error) {
        output.innerHTML = `<div class="error">Error loading data.</div>`;
        console.error(error);
        updateTime();
      }
    }

    function goToDetails(index) {
      window.location.href = "details.html?index=" + encodeURIComponent(index);
    }

    function updateTime() {
      const now = new Date();
      document.getElementById("lastUpdated").textContent =
        "Last updated: " + now.toLocaleString();
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      if (isNaN(d.getTime())) {
        return escapeHtml(String(value));
      }
      return d.toLocaleDateString();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
